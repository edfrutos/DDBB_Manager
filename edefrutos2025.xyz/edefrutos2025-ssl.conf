<VirtualHost *:443>
    ServerName edefrutos2025.xyz
    ServerAlias www.edefrutos2025.xyz
    DocumentRoot /var/www/vhosts/edefrutos2025.xyz/httpdocs

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/edefrutos2025.xyz/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/edefrutos2025.xyz/privkey.pem

    <Directory /var/www/vhosts/edefrutos2025.xyz/httpdocs>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Configuración de proxy
    ProxyPreserveHost On
    ProxyPass / unix:/var/www/vhosts/edefrutos2025.xyz/httpdocs/edefrutos2025.sock|fcgi://localhost/
    ProxyPassReverse / unix:/var/www/vhosts/edefrutos2025.xyz/httpdocs/edefrutos2025.sock|fcgi://localhost/

    # Deshabilitar HTTP/2
    Protocols http/1.1

    # Cabeceras de seguridad
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    # Configuración de cookies
    Header edit Set-Cookie ^(.*)$ $1;HttpOnly;Secure;SameSite=Lax

    ErrorLog ${APACHE_LOG_DIR}/edefrutos2025.xyz-error.log
    CustomLog ${APACHE_LOG_DIR}/edefrutos2025.xyz-access.log combined
</VirtualHost>