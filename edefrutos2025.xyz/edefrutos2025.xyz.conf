<VirtualHost *:80>
    ServerName edefrutos2025.xyz
    ServerAlias [www.edefrutos2025.xyz](www.edefrutos2025.xyz)
    
    # Aumentar timeouts
    ProxyTimeout 300
    Timeout 300
    
    # Mejorar la configuración del proxy
    ProxyPass / unix:/var/www/vhosts/edefrutos2025.xyz/httpdocs/app.sock|http://localhost/
    ProxyPassReverse / unix:/var/www/vhosts/edefrutos2025.xyz/httpdocs/app.sock|http://localhost/
    
    # Configuración alternativa usando TCP en lugar de socket Unix
    # ProxyPass / [http://127.0.0.1](http://127.0.0.1):5000/
    # ProxyPassReverse / [http://127.0.0.1](http://127.0.0.1):5000/
    
    # Logs
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>